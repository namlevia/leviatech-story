name: Build and Release Standalone Binaries

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build Standalone Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          
      - name: Build Frontend (Static Export)
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
          
      - name: Build and Package Binaries
        run: |
          export CGO_ENABLED=0
          
          build_and_zip() {
            local os=$1
            local arch=$2
            local ext=$3
            local target="leviatech-story-${os}-${arch}"
            
            echo "Building $target..."
            mkdir -p "release/$target/frontend"
            
            # Build Go binary
            GOOS=$os GOARCH=$arch go build -ldflags="-s -w" -o "release/$target/leviatech-story${ext}" ./cmd/api
            
            # Copy frontend, locales, and default data
            cp -r frontend/out release/$target/frontend/
            cp -r locales release/$target/
            mkdir -p release/$target/data
            cp data/*.json release/$target/data/
            
            # Zip it
            cd release
            zip -r "${target}.zip" "$target"
            cd ..
          }
          
          build_and_zip linux amd64 ""
          build_and_zip linux arm64 ""
          build_and_zip windows amd64 ".exe"
          build_and_zip windows arm64 ".exe"
          build_and_zip darwin amd64 ""
          build_and_zip darwin arm64 ""
          build_and_zip android arm64 ""
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/*.zip
          generate_release_notes: true
