version: '3.8'

services:
  leviatech-story:
    build: .
    container_name: leviatech-story
    restart: unless-stopped
    ports:
      - "1997:1997"
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./cache:/app/cache
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:1997/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
